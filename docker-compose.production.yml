# Markala — Production stack
# Hetzner VPS üzerinde çalıştırılır.
# Komutlar:
#   docker compose -f docker-compose.production.yml up -d
#   docker compose -f docker-compose.production.yml logs -f web
#   docker compose -f docker-compose.production.yml pull && docker compose -f docker-compose.production.yml up -d --no-build

services:
  postgres:
    image: postgres:16-alpine
    container_name: markala-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-markala}
      POSTGRES_USER: ${POSTGRES_USER:-markala}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=tr_TR.UTF-8"
      TZ: Europe/Istanbul
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-markala}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - markala
    # Sadece Docker network'te erişilebilir, dış dünyaya açma
    expose:
      - "5432"

  api:
    image: ghcr.io/${GITHUB_REPOSITORY:-soylemezz33/markala}/api:${TAG:-latest}
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: markala-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-markala}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-markala}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      # Integrations
      IYZICO_API_KEY: ${IYZICO_API_KEY}
      IYZICO_SECRET: ${IYZICO_SECRET}
      PARASUT_CLIENT_ID: ${PARASUT_CLIENT_ID}
      PARASUT_CLIENT_SECRET: ${PARASUT_CLIENT_SECRET}
      PARASUT_USERNAME: ${PARASUT_USERNAME}
      PARASUT_PASSWORD: ${PARASUT_PASSWORD}
      PARASUT_COMPANY_ID: ${PARASUT_COMPANY_ID}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      NETGSM_USERNAME: ${NETGSM_USERNAME}
      NETGSM_PASSWORD: ${NETGSM_PASSWORD}
      DHL_API_KEY: ${DHL_API_KEY}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET: ${R2_BUCKET:-markala-uploads}
      TZ: Europe/Istanbul
    networks:
      - markala
    expose:
      - "4000"

  web:
    image: ghcr.io/${GITHUB_REPOSITORY:-soylemezz33/markala}/web:${TAG:-latest}
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: markala-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: https://api.markala.com.tr
      NEXT_PUBLIC_GA4_ID: ${NEXT_PUBLIC_GA4_ID}
      NEXT_PUBLIC_CLARITY_ID: ${NEXT_PUBLIC_CLARITY_ID}
      NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION: ${NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION}
      NEXT_PUBLIC_BING_VERIFICATION: ${NEXT_PUBLIC_BING_VERIFICATION}
      NEXT_PUBLIC_YANDEX_VERIFICATION: ${NEXT_PUBLIC_YANDEX_VERIFICATION}
      NEXT_PUBLIC_GTM_ID: ${NEXT_PUBLIC_GTM_ID}
      NEXT_PUBLIC_APP_VERSION: ${TAG:-latest}
      TZ: Europe/Istanbul
    networks:
      - markala
    expose:
      - "3000"

  admin:
    image: ghcr.io/${GITHUB_REPOSITORY:-soylemezz33/markala}/admin:${TAG:-latest}
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    container_name: markala-admin
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      PORT: 3001
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_NAME: ${ADMIN_NAME}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET}
      NEXT_PUBLIC_API_URL: https://api.markala.com.tr
      TZ: Europe/Istanbul
    networks:
      - markala
    expose:
      - "3001"

  nginx:
    image: nginx:1.27-alpine
    container_name: markala-nginx
    restart: unless-stopped
    depends_on:
      - web
      - admin
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-cache:/var/cache/nginx
      - nginx-logs:/var/log/nginx
    networks:
      - markala

  # Otomatik backup — günlük postgres dump (local 30 gün + R2 remote)
  # Image: postgres-alpine + aws-cli (R2 upload için) — entrypoint'te kuruluyor
  backup:
    image: postgres:16-alpine
    container_name: markala-backup
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER:-markala}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB:-markala}
      TZ: Europe/Istanbul
      RETENTION_DAYS: 30
      # Remote backup (Cloudflare R2) — credentials yoksa upload sessizce atlanır
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_BACKUP_ACCESS_KEY_ID:-${R2_ACCESS_KEY_ID}}
      R2_SECRET_ACCESS_KEY: ${R2_BACKUP_SECRET_ACCESS_KEY:-${R2_SECRET_ACCESS_KEY}}
      R2_BUCKET: ${R2_BACKUP_BUCKET:-markala-backups}
      R2_PREFIX: postgres-backups
    volumes:
      - ./backups:/backups
      - ./scripts/backup-postgres.sh:/usr/local/bin/backup.sh:ro
      - ./scripts/restore-postgres.sh:/usr/local/bin/restore.sh:ro
      - ./scripts/r2-upload-backup.sh:/usr/local/bin/r2-upload.sh:ro
    networks:
      - markala
    entrypoint: ["sh", "-c"]
    # aws-cli kurulumu (idempotent — apk cache'lenir), sonra sonsuz backup loop
    command:
      - |
        apk add --no-cache aws-cli >/dev/null 2>&1 || true
        while true; do
          sh /usr/local/bin/backup.sh || echo "[$(date)] Backup hata aldı, döngü devam ediyor"
          sleep 86400
        done

  # ---------------------------------------------------------------------------
  # Monitoring stack (opsiyonel — Phase 1: yalnızca node-exporter + prometheus)
  # Kaldırmak için tüm bu blok silinebilir; ana stack etkilenmez.
  # ---------------------------------------------------------------------------
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: markala-node-exporter
    restart: unless-stopped
    command:
      - '--path.rootfs=/host'
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.textfile.directory=/var/lib/node_exporter/textfile_collector'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc|rootfs/var/lib/docker/containers|rootfs/var/lib/docker/overlay2|rootfs/run/docker/netns|rootfs/var/lib/docker/aufs)($$|/)'
    pid: host
    volumes:
      - /:/host:ro,rslave
      - ./backups/metrics:/var/lib/node_exporter/textfile_collector:ro
    networks:
      - markala
    expose:
      - "9100"

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.3
    container_name: markala-nginx-exporter
    restart: unless-stopped
    depends_on:
      - nginx
    command:
      - '--nginx.scrape-uri=http://nginx:8080/stub_status'
    networks:
      - markala
    expose:
      - "9113"

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: markala-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-markala}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-markala}?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - markala
    expose:
      - "9187"

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: markala-prometheus
    restart: unless-stopped
    depends_on:
      - node-exporter
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts:/etc/prometheus/alerts:ro
      - ./backups:/var/lib/markala-backups:ro
      - prometheus-data:/prometheus
    networks:
      - markala
    expose:
      - "9090"
    # Prod'da nginx üzerinden basic-auth ile expose et — şimdilik kapalı

volumes:
  postgres-data:
    driver: local
  nginx-cache:
    driver: local
  nginx-logs:
    driver: local
  prometheus-data:
    driver: local

networks:
  markala:
    driver: bridge
