# Markala — Prometheus scrape config
# Hetzner VPS lokal node-exporter + nginx-exporter scrape'i.
# Remote write opsiyonel: Grafana Cloud free tier (10K active series).
#
# Reload: curl -X POST http://localhost:9090/-/reload
# Validate: promtool check config monitoring/prometheus.yml

global:
  scrape_interval: 30s
  scrape_timeout: 10s
  evaluation_interval: 30s
  external_labels:
    environment: production
    project: markala
    region: hetzner-fsn1

# ---------------------------------------------------------------------------
# Scrape targets
# ---------------------------------------------------------------------------
scrape_configs:
  # Prometheus self-monitor
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Host metrics (CPU, RAM, disk, network)
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          host: 'markala-prod-1'

  # Nginx (request rate, latency, 5xx)
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx-exporter:9113']

  # Postgres (connection count, query latency)
  # postgres-exporter sidecar docker-compose.production.yml'da çalışır
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
    metrics_path: /metrics

  # Markala API health (custom /metrics endpoint — Phase 2)
  - job_name: 'markala-api'
    metrics_path: /metrics
    static_configs:
      - targets: ['api:4000']

# ---------------------------------------------------------------------------
# Alerting rules — monitoring/alerts/rules.yml
# ---------------------------------------------------------------------------
rule_files:
  - 'alerts/rules.yml'

