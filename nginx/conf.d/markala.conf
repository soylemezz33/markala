# Markala — site, admin, API server bloks
# Tüm HTTP → HTTPS redirect

# === HTTP → HTTPS Redirect ===
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Let's Encrypt challenge için (eğer Cloudflare yoksa)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# === Web — markala.com.tr & www.markala.com.tr ===
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name markala.com.tr www.markala.com.tr;

    ssl_certificate /etc/nginx/ssl/markala.com.tr.pem;
    ssl_certificate_key /etc/nginx/ssl/markala.com.tr.key;

    # www → root canonical redirect
    if ($host = "www.markala.com.tr") {
        return 301 https://markala.com.tr$request_uri;
    }

    # Rate limit
    limit_req zone=general burst=60 nodelay;
    limit_conn connlimit 50;

    # Security headers (Next.js zaten ekliyor ama backup)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Statik asset'ler için uzun cache
    location /_next/static/ {
        proxy_pass http://web:3000;
        proxy_cache markala_cache;
        proxy_cache_valid 200 365d;
        add_header X-Cache-Status $upstream_cache_status;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Image optimization endpoint
    location /_next/image {
        proxy_pass http://web:3000;
        proxy_cache markala_cache;
        proxy_cache_valid 200 30d;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # Mockup endpoint — long cache (SEO OG images)
    location /api/mockup {
        proxy_pass http://web:3000;
        proxy_cache markala_cache;
        proxy_cache_valid 200 7d;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # API endpoint'leri — no cache
    location /api/ {
        limit_req zone=api burst=120 nodelay;
        proxy_pass http://web:3000;
        proxy_cache off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Diğer tüm istekler → web
    location / {
        proxy_pass http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 60s;
        proxy_connect_timeout 30s;
    }

    # Sitemap & robots
    location = /sitemap.xml {
        proxy_pass http://web:3000;
        proxy_cache markala_cache;
        proxy_cache_valid 200 1h;
    }

    location = /robots.txt {
        proxy_pass http://web:3000;
        proxy_cache markala_cache;
        proxy_cache_valid 200 1h;
    }
}

# === Admin — admin.markala.com.tr ===
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.markala.com.tr;

    ssl_certificate /etc/nginx/ssl/markala.com.tr.pem;
    ssl_certificate_key /etc/nginx/ssl/markala.com.tr.key;

    # Admin için sıkı rate limit (brute force protection)
    limit_req zone=auth burst=20 nodelay;
    limit_conn connlimit 20;

    # Tarama motorlarına asla görünmesin
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    add_header X-Frame-Options "DENY" always;

    # Login endpoint için ekstra sıkı limit
    location ~ ^/(api/auth/login|giris) {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://admin:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        proxy_pass http://admin:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# === API — api.markala.com.tr ===
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.markala.com.tr;

    ssl_certificate /etc/nginx/ssl/markala.com.tr.pem;
    ssl_certificate_key /etc/nginx/ssl/markala.com.tr.key;

    # API için yüksek throughput
    limit_req zone=api burst=200 nodelay;
    limit_conn connlimit 100;

    # CORS — sadece markala.com.tr
    add_header Access-Control-Allow-Origin "https://markala.com.tr" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
    add_header Access-Control-Allow-Credentials "true" always;

    if ($request_method = OPTIONS) {
        return 204;
    }

    location / {
        proxy_pass http://api:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
    }
}
