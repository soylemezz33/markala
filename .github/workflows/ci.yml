name: CI — Type Check, Build & Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Type-check & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        # Versiyon package.json "packageManager" alanından okunur (pnpm@10.33.3).
        # Burada ayrıca `version:` verilirse "Multiple versions of pnpm" hatası → CI kurulumu patlar.
        uses: pnpm/action-setup@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check (web)
        run: pnpm --filter @markala/web type-check

      - name: Type-check (admin)
        run: pnpm --filter @markala/admin type-check

      - name: Type-check (api)
        run: pnpm --filter @markala/api type-check
        continue-on-error: true # API henüz tam strict değil

      - name: Build (web)
        run: pnpm --filter @markala/web build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Build (admin)
        run: pnpm --filter @markala/admin build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          ADMIN_SESSION_SECRET: "ci-build-only-not-for-production-use-min-32-char"

  test-unit-web:
    name: Unit Tests + Coverage (web)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      # Versiyon package.json "packageManager"dan; `version:` verme → "Multiple versions" hatası.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run Vitest + coverage (@markala/web)
        run: pnpm --filter @markala/web test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-web
          path: apps/web/coverage/
          retention-days: 14

  test-unit-api:
    name: Unit Tests + Coverage (api)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run Vitest + coverage (@markala/api)
        run: pnpm --filter @markala/api test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-api
          path: apps/api/coverage/
          retention-days: 14
