name: CI — Type Check & Build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Type-check & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        # Versiyon package.json "packageManager" alanından okunur (pnpm@10.33.3).
        # Burada ayrıca `version:` verilirse "Multiple versions of pnpm" hatası → CI kurulumu patlar.
        uses: pnpm/action-setup@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check (web)
        run: pnpm --filter @markala/web type-check

      - name: Type-check (admin)
        run: pnpm --filter @markala/admin type-check

      # API tsc'si üretilmiş Prisma Client tiplerine ihtiyaç duyar; pnpm postinstall
      # script'lerini atladığı için generate'i açıkça çalıştırıyoruz.
      - name: Generate Prisma Client (api)
        run: pnpm --filter @markala/api prisma:generate

      - name: Type-check (api)
        run: pnpm --filter @markala/api type-check

      - name: Build (web)
        run: pnpm --filter @markala/web build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Build (admin)
        run: pnpm --filter @markala/admin build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          ADMIN_SESSION_SECRET: "ci-build-only-not-for-production-use-min-32-char"

  test-unit:
    name: Unit Tests (web)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      # Versiyon package.json "packageManager"dan; `version:` verme → "Multiple versions" hatası.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run Vitest unit tests (@markala/web)
        run: pnpm --filter @markala/web test

  test-api:
    name: Unit Tests (api)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      # Versiyon package.json "packageManager"dan; `version:` verme → "Multiple versions" hatası.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Vitest spec'leri @prisma/client'tan tip/sınıf import ediyor (mock'lu, DB yok);
      # generate olmadan import "did you forget prisma generate" ile patlar.
      - name: Generate Prisma Client (api)
        run: pnpm --filter @markala/api prisma:generate

      - name: Run Vitest unit tests (@markala/api)
        run: pnpm --filter @markala/api test
