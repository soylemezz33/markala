name: CI — Type Check & Build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege GITHUB_TOKEN: CI yalnız checkout + install + build yapar.
# Üst seviye read-only token, ele geçen bir action/bağımlılığın kod push'lamasını
# veya paket yayınlamasını engeller (GitHub hardening önerisi).
permissions:
  contents: read

jobs:
  validate:
    name: Type-check, Build & Format
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        # Versiyon package.json "packageManager" alanından okunur (pnpm@10.33.3).
        # Burada ayrıca `version:` verilirse "Multiple versions of pnpm" hatası → CI kurulumu patlar.
        uses: pnpm/action-setup@v4

      - name: Setup Node 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check (Prettier)
        run: pnpm format:check
        # Mevcut biçim sapması build'i bloklamaz; her PR'da annotation olarak
        # görünür kalır (kademeli kapı). Tam sweep sonrası bloklayıcıya çekilecek.
        continue-on-error: true

      - name: Type-check (web)
        run: pnpm --filter @markala/web type-check

      - name: Type-check (admin)
        run: pnpm --filter @markala/admin type-check

      - name: Type-check (api)
        run: pnpm --filter @markala/api type-check
        continue-on-error: true # API henüz tam strict değil

      - name: Build (web)
        run: pnpm --filter @markala/web build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Build (admin)
        run: pnpm --filter @markala/admin build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          ADMIN_SESSION_SECRET: "ci-build-only-not-for-production-use-min-32-char"

      - name: KVKK legal placeholder kontrolü
        # Yasal metinlerde doldurulmamış placeholder varsa uyarır.
        # Yayın öncesi ETBİS/VERBİS/KEP kayıtları tamamlanana kadar continue-on-error aktif.
        run: |
          if grep -r "BAŞVURU BEKLEMEDE" packages/mock-data/src/legal.ts; then
            echo "::warning file=packages/mock-data/src/legal.ts::KVKK yasal metinlerde doldurulmamış placeholder bulundu. ETBİS/VERBİS/KEP kayıtları tamamlanınca ilgili sabitleri güncelleyin."
            exit 1
          fi
        continue-on-error: true

  test-unit:
    name: Unit Tests (web)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      # Versiyon package.json "packageManager"dan; `version:` verme → "Multiple versions" hatası.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run Vitest unit tests (@markala/web)
        run: pnpm --filter @markala/web test

  security-audit:
    name: Dependency Audit (pnpm)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      # Versiyon package.json "packageManager"dan; `version:` verme → "Multiple versions" hatası.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Bilgilendirme amaçlı — high/critical zafiyetleri raporlar ama build'i bloklamaz.
      # (Dependabot otomatik bump PR'ları açar; bu adım o anki lockfile'ın anlık denetimi.)
      # Bloklayıcı yapmadan önce mevcut advisory'ler temizlenmeli → ayrı bir takip işi.
      - name: pnpm audit (high+ — non-blocking)
        run: pnpm audit --audit-level=high --prod
        continue-on-error: true
