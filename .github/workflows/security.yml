name: Security — Dependency Audit & Secret Scan

# Haftalık güvenlik taramasını CI'a taşır: bağımlılık açıkları (pnpm audit) +
# sır sızıntısı (TruffleHog). PR'larda, main push'larında ve her Pazartesi çalışır.
# Manuel tetik için Actions sekmesinden "Run workflow" (workflow_dispatch).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Her Pazartesi 06:00 UTC — haftalık otomatik tarama
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dependency-audit:
    name: Dependency Audit (pnpm)
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        # Versiyon package.json "packageManager" alanından okunur (pnpm@10.33.3).
        # `version:` verme → "Multiple versions of pnpm" hatası (ci.yml ile aynı kural).
        uses: pnpm/action-setup@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # BLOKLAYAN KAPI — production bağımlılıklarında KRİTİK açık merge'i engeller.
      # Bugün yeşil (0 kritik prod). Backlog (örn. Next.js 14 → 15.5.16 yükseltmesi,
      # multer 2.1.1) temizlendikçe eşiği kademeli olarak yükseltin:
      #   --audit-level=critical  →  --audit-level=high
      - name: Audit production deps (fail on CRITICAL)
        run: pnpm audit --prod --audit-level=critical

      # BİLGİLENDİRME — tam ağaç (dev dahil) raporu job summary'ye yazılır, build'i KIRMAZ.
      # Açık backlog'unu görünür tutar; eşik yükseldikçe burada izlenir.
      - name: Full audit report (non-blocking)
        if: always()
        shell: bash
        run: |
          {
            echo "## pnpm audit — tam rapor (prod + dev)"
            echo ""
            echo '```'
            pnpm audit 2>&1 | tail -n 40 || true
            echo '```'
            echo ""
            echo "> Bloklayan kapı yalnızca **production + critical** içindir."
            echo "> Yukarıdaki high/moderate kalemler için bağımlılık güncelliği backlog'una bakın."
          } >> "$GITHUB_STEP_SUMMARY"

  secret-scan:
    name: Secret Scan (TruffleHog)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Çalışma ağacını doğrulanmış (verified) sırlar için tarar; bulursa build'i KIRAR.
      # --only-verified: gerçek/aktif sırları doğrular → .env.example placeholder'ları
      # gibi sahte pozitifler kapıyı kırmaz. Docker imajı her tetik tipinde (PR/push/
      # schedule/dispatch) deterministik çalışır.
      - name: TruffleHog filesystem scan (verified secrets → fail)
        run: |
          docker run --rm -v "${{ github.workspace }}:/repo" \
            trufflesecurity/trufflehog:latest \
            filesystem /repo --only-verified --fail --no-update
