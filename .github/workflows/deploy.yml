name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch: # Manuel tetikleme

concurrency:
  group: deploy-production
  cancel-in-progress: false # Deploy'lar üst üste binmemeli

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        app: [web, admin, api]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.app }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          # NEXT_PUBLIC_* BUILD-TIME gömülür — web/admin imajlarına buradan geçmeli.
          # (api bu arg'ları kullanmaz, görmezden gelir — zararsız.)
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.markala.com.tr
            NEXT_PUBLIC_GA4_ID=${{ vars.NEXT_PUBLIC_GA4_ID }}
            NEXT_PUBLIC_CLARITY_ID=${{ vars.NEXT_PUBLIC_CLARITY_ID }}
            NEXT_PUBLIC_GTM_ID=${{ vars.NEXT_PUBLIC_GTM_ID }}
            NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION=${{ vars.NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION }}
            NEXT_PUBLIC_BING_VERIFICATION=${{ vars.NEXT_PUBLIC_BING_VERIFICATION }}
            NEXT_PUBLIC_YANDEX_VERIFICATION=${{ vars.NEXT_PUBLIC_YANDEX_VERIFICATION }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}
          platforms: linux/amd64

  deploy:
    name: Deploy to VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
      url: https://markala.com.tr

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            cd /opt/markala
            # AKTİF DB incident'ı (2026-06-15) band-aid'i KIRILGAN: tam 'docker compose up'
            # + --remove-orphans postgres volume/network'ünü tekrar bozabilir. Bu yüzden deploy
            # postgres'e DOKUNMAZ — yalnız app servislerini (web/admin/api) günceller.
            echo "→ Pre-deploy DB yedeği (best-effort)..."
            mkdir -p backups
            docker exec markala-postgres pg_dump -U "${POSTGRES_USER:-markala}" "${POSTGRES_DB:-markala}" > "backups/db-predeploy-$(date +%Y%m%d-%H%M%S).sql" 2>/dev/null || echo "  (yedek atlandı — manuel yedek al)"
            echo "→ App imajlarını çek (web/admin/api)..."
            docker compose -f docker-compose.production.yml --env-file .env.production pull web admin api
            echo "→ Sadece app servislerini güncelle (postgres/nginx KORUNUR)..."
            docker compose -f docker-compose.production.yml --env-file .env.production up -d --no-build --no-deps web admin api
            echo "→ Sağlık kontrolü..."
            sleep 10
            curl -fsS http://localhost:3000/api/health || (echo "❌ Health check failed!" && exit 1)
            echo "→ Eski imajları temizle..."
            docker image prune -f
            echo "✅ Deploy complete: ${{ github.sha }}"

      - name: Notify on success
        if: success()
        run: echo "✅ Markala deployed successfully — https://markala.com.tr"

      - name: Notify on failure
        if: failure()
        run: echo "❌ Deploy FAILED — check VPS logs immediately"
