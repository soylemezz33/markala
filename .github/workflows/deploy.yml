name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch: # Manuel tetikleme

concurrency:
  group: deploy-production
  cancel-in-progress: false # Deploy'lar üst üste binmemeli

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        app: [web, admin, api]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.app }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & Push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          # NEXT_PUBLIC_* BUILD-TIME gömülür — web/admin imajlarına buradan geçmeli.
          # (api bu arg'ları kullanmaz, görmezden gelir — zararsız.)
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.markala.com.tr
            NEXT_PUBLIC_GA4_ID=${{ vars.NEXT_PUBLIC_GA4_ID }}
            NEXT_PUBLIC_CLARITY_ID=${{ vars.NEXT_PUBLIC_CLARITY_ID }}
            NEXT_PUBLIC_GTM_ID=${{ vars.NEXT_PUBLIC_GTM_ID }}
            NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION=${{ vars.NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION }}
            NEXT_PUBLIC_BING_VERIFICATION=${{ vars.NEXT_PUBLIC_BING_VERIFICATION }}
            NEXT_PUBLIC_YANDEX_VERIFICATION=${{ vars.NEXT_PUBLIC_YANDEX_VERIFICATION }}
            NEXT_PUBLIC_TURNSTILE_SITE_KEY=${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ vars.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
            NEXT_PUBLIC_ADS_PURCHASE_LABEL=${{ vars.NEXT_PUBLIC_ADS_PURCHASE_LABEL }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}
          platforms: linux/amd64

  deploy:
    name: Deploy to VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
      url: https://markala.com.tr

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 13m
          script: |
            set -e
            cd /opt/markala
            # AKTİF DB incident'ı (2026-06-15) band-aid'i KIRILGAN: tam 'docker compose up'
            # + --remove-orphans postgres volume/network'ünü tekrar bozabilir. Bu yüzden deploy
            # postgres'e DOKUNMAZ — yalnız app servislerini (web/admin/api) günceller.
            echo "→ Pre-deploy DB yedeği (best-effort)..."
            mkdir -p backups
            docker exec markala-postgres sh -c 'pg_dump -U "${POSTGRES_USER:-markala}" "${POSTGRES_DB:-markala}"' > "backups/db-predeploy-$(date +%Y%m%d-%H%M%S).sql" 2>/dev/null || echo "  (yedek atlandı — manuel yedek al)"
            echo "→ App imajlarını çek (web/admin/api)..."
            docker compose -f docker-compose.production.yml --env-file .env.production pull web admin api
            echo "→ Önceki recreate kalıntılarını temizle (<hash>_markala-*)..."
            docker rm -f $(docker ps -aq --filter name=_markala- 2>/dev/null) 2>/dev/null || true
            echo "→ Sadece app servislerini güncelle (postgres/nginx KORUNUR)..."
            docker compose -f docker-compose.production.yml --env-file .env.production up -d --no-build --no-deps web admin api
            echo "→ Nginx reload (recreate sonrası bayat upstream IP fix)..."
            sleep 5
            docker exec markala-nginx nginx -s reload || { echo "⚠ nginx reload başarısız — bayat upstream riski (dış doğrulama yakalar)"; docker exec markala-nginx nginx -t 2>&1 || true; }
            # Sağlık kontrolü: host'ta 3000 portu publish DEĞİL ve host'ta curl YOK —
            # bu yüzden compose'un kendi healthcheck'lerine bakılır (tek doğru vantaj noktası).
            echo "→ Sağlık kontrolü (compose healthcheck, maks ~2 dk)..."
            ok=0
            for i in $(seq 1 12); do
              n=$(docker inspect -f '{{.State.Health.Status}}' markala-web markala-admin markala-api 2>/dev/null | grep -c '^healthy$' || true)
              echo "  deneme $i/12: healthy=$n/3"
              if [ "$n" = "3" ]; then ok=1; break; fi
              sleep 10
            done
            if [ "$ok" != "1" ]; then
              echo "❌ Health check failed! Container durumları:"
              docker ps --format '{{.Names}} {{.Status}}' | grep markala || true
              exit 1
            fi
            echo "→ Eski imaj + build cache temizliği (volume/DB DOKUNULMAZ)..."
            docker image prune -f || true
            docker builder prune -f >/dev/null 2>&1 || true
            df -h / | tail -1
            echo "✅ Deploy complete: ${{ github.sha }}"

      # Dış doğrulama runner'dan yapılır (VPS host'unda curl yok). CF challenge'ı
      # 403 dönebilir — origin çökmesini (502/520/521) yakalamak için eşik <500.
      - name: Verify production (external)
        run: |
          for u in "https://markala.com.tr" "https://api.markala.com.tr/api/health"; do
            ok=0
            for i in $(seq 1 6); do
              code=$(curl -s -o /dev/null -m 25 -w '%{http_code}' -A "Mozilla/5.0 (GH-Actions verify)" "$u") || code=000
              echo "$u -> HTTP $code (deneme $i)"
              if [ "$code" -ge 200 ] && [ "$code" -lt 500 ]; then ok=1; break; fi
              sleep 8
            done
            if [ "$ok" != "1" ]; then echo "❌ $u origin hatası veriyor"; exit 1; fi
          done
          echo "✅ Dış doğrulama geçti"

      - name: Notify on success
        if: success()
        run: echo "✅ Markala deployed successfully — https://markala.com.tr"

      - name: Notify on failure
        if: failure()
        run: echo "❌ Deploy FAILED — check VPS logs immediately"
