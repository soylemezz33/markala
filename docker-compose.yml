services:
  postgres:
    image: postgres:16-alpine
    container_name: markala-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: markala
      POSTGRES_PASSWORD: markala
      POSTGRES_DB: markala
    ports:
      - "5432:5432"
    volumes:
      - markala_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U markala -d markala"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: markala-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - markala_redis:/data
    healthcheck:
      # redis-cli redis:7-alpine imajında gömülü; PONG dönerse exit 0 (healthy).
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog
    container_name: markala-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI

volumes:
  markala_postgres:
  markala_redis:
